<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="MyVateTool - Your VAT calculation assistant." />
    <meta name="theme-color" content="#0078d7" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'wasm-unsafe-eval';">
    <title>MyVateTool</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />

<body>

            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />

        <a class="dismiss">🗙</a>

    <script src="js/xlsx.full.min.js" defer></script>
    <script src="_content/Syncfusion.Blazor.Core/scripts/syncfusion-blazor.min.js"></script>
    <script type="module" src="js/bridge.js" defer></script>
    <script src="js/file-saver.min.js"></script>
    <script src="js/excelInterop.js"></script>
    <script src="js/pdf-lib.umd.min.js"></script>
    <script src="js/pdfInterop.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>

</html>
